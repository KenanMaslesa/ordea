<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18a8b2"/>
      <stop offset="100%" stop-color="#0a6068"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- O ring -->
  <circle cx="256" cy="256" r="125" fill="none" stroke="white" stroke-width="52" opacity="0.95"/>

  <!-- Order list lines inside the O -->
  <rect x="214" y="218" width="84" height="13" rx="6.5" fill="white" opacity="0.95"/>
  <rect x="206" y="250" width="100" height="13" rx="6.5" fill="white" opacity="0.95"/>
  <rect x="218" y="282" width="68" height="13" rx="6.5" fill="white" opacity="0.95"/>

  <!-- Red notification dot (top-right, overlapping the ring) -->
  <circle cx="348" cy="164" r="40" fill="#FF4D4D"/>
  <circle cx="348" cy="164" r="40" fill="none" stroke="#0f7880" stroke-width="8"/>
</svg>
</svg>
